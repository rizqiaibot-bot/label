<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Template Label 5x3 cm Editable - A4 Landscape</title>
    <style>
        /* Pengaturan Dasar Kertas A4 Landscape */
        @page {
            size: A4 landscape;
            margin: 0;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Container Utama Pas di Tengah Kertas A4 Landscape */
        .page-container {
            width: 297mm;
            height: 210mm;
            padding-top: 18mm; 
            padding-left: 13mm; 
            box-sizing: border-box;
            background-color: #ffffff;
        }

        /* Susunan Grid Baru: 5 Kolom (Lebar 5cm) x 5 Baris (Tinggi 3cm) */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(5, 50mm);
            grid-template-rows: repeat(5, 30mm);
            gap: 5mm; 
        }

        /* Desain Kotak Label Panjang 5cm x Tinggi 3cm */
        .card-box {
            width: 50mm;
            height: 30mm;
            border: 1px solid #555555; 
            border-radius: 4mm;        
            box-sizing: border-box;
            padding: 2.5mm;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background-color: #ffffff;
            overflow: hidden;
            cursor: grab;
            transition: opacity 0.15s, transform 0.15s, box-shadow 0.15s;
            position: relative;
        }

        .card-box .delete-btn {
            position: absolute;
            top: 1mm;
            right: 1mm;
            width: 5mm;
            height: 5mm;
            border-radius: 50%;
            border: none;
            background: #ef4444;
            color: #fff;
            font-size: 9px;
            font-weight: bold;
            line-height: 1;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 0;
            z-index: 10;
        }

        .card-box:hover .delete-btn { display: flex; }

        .card-box:active { cursor: grabbing; }

        .card-box.dragging {
            opacity: 0.4;
            transform: scale(0.95);
        }

        .card-box.drag-over {
            box-shadow: 0 0 0 3px #38bdf8;
            border-color: #38bdf8;
        }

        /* Kolom Input Nama Produk (Huruf Besar & Slider Dihilangkan) */
        .product-name {
            font-size: 16px; 
            font-weight: bold;
            color: #333333;
            border: none;
            outline: none;
            resize: none;
            width: 100%;
            height: 13mm;
            text-align: center;
            font-family: inherit;
            background: transparent;
            overflow: hidden; /* Menghilangkan slider/scrollbar internal textarea */
            line-height: 1.2;
        }

        /* Kolom Input Harga (Huruf Besar) */
        .product-price {
            font-size: 30px; 
            font-weight: 800;
            color: #d32f2f;
            border: none;
            outline: none;
            width: 100%;
            text-align: center;
            font-family: inherit;
            background: transparent;
        }

        /* Toolbar */
        .toolbar {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 12px;
        }

        .toolbar button {
            padding: 8px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.15s;
        }

        .btn-print {
            background: #2563eb;
            color: #fff;
        }

        .btn-print:hover { background: #1d4ed8; }

        .btn-clear {
            background: #fff;
            color: #dc2626;
            border: 2px solid #dc2626 !important;
        }

        .btn-clear:hover { background: #fef2f2; }

        /* Pengaturan Saat Dicetak */
        @media print {
            .toolbar { display: none; }
            body {
                background: none;
            }
            .card-box {
                border: 1px solid #000000; /* Garis hitam tegas saat dicetak */
            }
            .product-name, .product-price {
                placeholder: none;
            }
            /* Memastikan slider benar-benar mati total saat print */
            textarea.product-name {
                scrollbar-width: none; 
            }
            textarea.product-name::-webkit-scrollbar {
                display: none; 
            }
        }
    </style>
</head>
<body>

    <div class="toolbar">
        <button class="btn-print" onclick="window.print()">🖨 Cetak</button>
        <button class="btn-clear" id="btnClearAll">🗑 Bersihkan Semua</button>
    </div>

    <div class="page-container">
        <div class="grid-container">

            <div class="card-box" data-id="l0"><textarea class="product-name" placeholder="Klik & Ketik Nama Produk..."></textarea><input type="text" class="product-price" placeholder="Rp 0.000"></div>

            <div class="card-box" data-id="l7"><textarea class="product-name" placeholder="Klik & Ketik Nama Produk..."></textarea><input type="text" class="product-price" placeholder="Rp 0.000"></div>

            <div class="card-box" data-id="l20"><textarea class="product-name" placeholder="Klik & Ketik Nama Produk..."></textarea><input type="text" class="product-price" placeholder="Rp 0.000"></div>
            <div class="card-box" data-id="l21"><textarea class="product-name" placeholder="Klik & Ketik Nama Produk..."></textarea><input type="text" class="product-price" placeholder="Rp 0.000"></div>
            <div class="card-box" data-id="l22"><textarea class="product-name" placeholder="Klik & Ketik Nama Produk..."></textarea><input type="text" class="product-price" placeholder="Rp 0.000"></div>
            <div class="card-box" data-id="l23"><textarea class="product-name" placeholder="Klik & Ketik Nama Produk..."></textarea><input type="text" class="product-price" placeholder="Rp 0.000"></div>
            <div class="card-box" data-id="l24"><textarea class="product-name" placeholder="Klik & Ketik Nama Produk..."></textarea><input type="text" class="product-price" placeholder="Rp 0.000"></div>
        </div>
    </div>

<script>
(function() {
    var grid = document.querySelector('.grid-container');
    var dragged = null;
    var STORAGE_ORDER = 'label_order';
    var STORAGE_DATA = 'label_data';

    function saveState() {
        var boxes = grid.querySelectorAll('.card-box');
        var order = [];
        var data = {};
        boxes.forEach(function(box) {
            var id = box.getAttribute('data-id');
            order.push(id);
            data[id] = {
                name: box.querySelector('.product-name').value,
                price: box.querySelector('.product-price').value
            };
        });
        localStorage.setItem(STORAGE_ORDER, JSON.stringify(order));
        localStorage.setItem(STORAGE_DATA, JSON.stringify(data));
    }

    function restoreState() {
        var order = JSON.parse(localStorage.getItem(STORAGE_ORDER));
        var data = JSON.parse(localStorage.getItem(STORAGE_DATA));
        if (!order || !data) return;

        var boxes = {};
        grid.querySelectorAll('.card-box').forEach(function(box) {
            boxes[box.getAttribute('data-id')] = box;
        });

        order.forEach(function(id) {
            if (boxes[id]) grid.appendChild(boxes[id]);
        });

        Object.keys(data).forEach(function(id) {
            if (boxes[id]) {
                boxes[id].querySelector('.product-name').value = data[id].name || '';
                boxes[id].querySelector('.product-price').value = data[id].price || '';
            }
        });
    }

    function initDrag(box) {
        box.draggable = true;
        box.addEventListener('dragstart', function(e) {
            dragged = this;
            this.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        });

        box.addEventListener('dragend', function() {
            this.classList.remove('dragging');
            grid.querySelectorAll('.card-box').forEach(function(b) { b.classList.remove('drag-over'); });
            saveState();
            dragged = null;
        });

        box.addEventListener('dragover', function(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            if (this !== dragged) this.classList.add('drag-over');
        });

        box.addEventListener('dragleave', function() {
            this.classList.remove('drag-over');
        });

        box.addEventListener('drop', function(e) {
            e.preventDefault();
            this.classList.remove('drag-over');
            if (dragged && dragged !== this) {
                var all = Array.from(grid.children);
                var fromIdx = all.indexOf(dragged);
                var toIdx = all.indexOf(this);
                if (fromIdx < toIdx) {
                    this.parentNode.insertBefore(dragged, this.nextSibling);
                } else {
                    this.parentNode.insertBefore(dragged, this);
                }
            }
        });
    }

    grid.querySelectorAll('.card-box').forEach(function(box) {
        initDrag(box);

        box.querySelector('.product-name').addEventListener('input', saveState);
        box.querySelector('.product-price').addEventListener('input', saveState);

        var delBtn = document.createElement('button');
        delBtn.className = 'delete-btn';
        delBtn.textContent = '✕';
        delBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            box.querySelector('.product-name').value = '';
            box.querySelector('.product-price').value = '';
            saveState();
        });
        box.appendChild(delBtn);
    });

    restoreState();

    document.getElementById('btnClearAll').addEventListener('click', function() {
        if (!confirm('Hapus isi semua 25 label?')) return;
        grid.querySelectorAll('.card-box').forEach(function(box) {
            box.querySelector('.product-name').value = '';
            box.querySelector('.product-price').value = '';
        });
        saveState();
    });
})();
</script>
</body>
</html>
